<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<!-- ===== NAVBAR FRAGMENT ===== -->
<nav th:fragment="navbar" class="navbar col-lg-12 col-12 p-0 fixed-top d-flex flex-row">
  <div class="navbar-brand-wrapper d-flex justify-content-center">
    <div class="navbar-brand-inner-wrapper d-flex justify-content-between align-items-center w-100">
      <a class="navbar-brand brand-logo" th:href="@{/admin/dashboard}">
        <span style="font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:1px;">🏨 HotelAdmin</span>
      </a>
      <a class="navbar-brand brand-logo-mini" th:href="@{/admin/dashboard}">
        <span style="font-size:1.1rem;font-weight:700;color:#fff;">H</span>
      </a>
      <button class="navbar-toggler navbar-toggler align-self-center" type="button" data-toggle="minimize">
        <span class="typcn typcn-th-menu"></span>
      </button>
    </div>
  </div>
  <div class="navbar-menu-wrapper d-flex align-items-center justify-content-end">
    <ul class="navbar-nav me-lg-2">
      <li class="nav-item nav-profile dropdown">
        <a class="nav-link" href="#" data-bs-toggle="dropdown" id="profileDropdown">
          <i class="typcn typcn-user-outline" style="font-size:1.5rem;color:#fff;"></i>
          <span class="nav-profile-name" th:text="${#authentication != null ? #authentication.name : 'Admin'}">Admin</span>
        </a>
        <div class="dropdown-menu dropdown-menu-right navbar-dropdown" aria-labelledby="profileDropdown">
          <a class="dropdown-item" th:href="@{/admin/profile}">
            <i class="typcn typcn-cog-outline text-primary"></i> Cài đặt
          </a>
          <a class="dropdown-item" th:href="@{/logout}">
            <i class="typcn typcn-eject text-primary"></i> Đăng xuất
          </a>
        </div>
      </li>
    </ul>
    <ul class="navbar-nav navbar-nav-right">
      <li class="nav-item nav-date dropdown">
        <a class="nav-link d-flex justify-content-center align-items-center" href="javascript:;">
          <h6 class="date mb-0" id="currentDate">--</h6>
          <i class="typcn typcn-calendar ms-2"></i>
        </a>
      </li>
    </ul>
    <button class="navbar-toggler navbar-toggler-right d-lg-none align-self-center" type="button" data-toggle="offcanvas">
      <span class="typcn typcn-th-menu"></span>
    </button>
  </div>
</nav>

<!-- ===== BREADCRUMB FRAGMENT ===== -->
<nav th:fragment="breadcrumb(pageTitle, pageParent)" class="navbar-breadcrumb col-xl-12 col-12 d-flex flex-row p-0">
  <div class="navbar-links-wrapper d-flex align-items-stretch">
    <div class="nav-link">
      <a th:href="@{/admin/rooms}"><i class="typcn typcn-home-outline"></i></a>
    </div>
    <div class="nav-link">
      <a th:href="@{/admin/rooms}"><i class="typcn typcn-document-text"></i></a>
    </div>
  </div>
  <div class="navbar-menu-wrapper d-flex align-items-center justify-content-end">
    <ul class="navbar-nav me-lg-2">
      <li class="nav-item ms-0">
        <h4 class="mb-0" th:text="${pageTitle}">Trang</h4>
      </li>
      <li class="nav-item">
        <div class="d-flex align-items-baseline">
          <p class="mb-0">Trang chủ</p>
          <i class="typcn typcn-chevron-right"></i>
          <p class="mb-0" th:text="${pageTitle}">Trang</p>
        </div>
      </li>
    </ul>
  </div>
</nav>

<!-- ===== SIDEBAR FRAGMENT ===== -->
<nav th:fragment="sidebar" class="sidebar sidebar-offcanvas" id="sidebar">
  <ul class="nav">
    <li class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'">
      <a class="nav-link" th:href="@{/admin/dashboard}">
        <i class="typcn typcn-device-desktop menu-icon"></i>
        <span class="menu-title">Dashboard</span>
      </a>
    </li>
    <li class="nav-item" th:classappend="${activePage == 'rooms'} ? 'active'">
      <a class="nav-link" th:href="@{/admin/rooms}">
        <i class="typcn typcn-home-outline menu-icon"></i>
        <span class="menu-title">Quản lý phòng</span>
      </a>
    </li>
    <li class="nav-item" th:classappend="${activePage == 'bookings'} ? 'active'">
      <a class="nav-link" th:href="@{/admin/bookings}">
        <i class="typcn typcn-document-text menu-icon"></i>
        <span class="menu-title">Đặt phòng</span>
      </a>
    </li>
    <li class="nav-item" th:classappend="${activePage == 'customers'} ? 'active'">
      <a class="nav-link" th:href="@{/admin/customers}">
        <i class="typcn typcn-group menu-icon"></i>
        <span class="menu-title">Khách hàng</span>
      </a>
    </li>
    <li class="nav-item" th:classappend="${activePage == 'reports'} ? 'active'">
      <a class="nav-link" th:href="@{/admin/reports}">
        <i class="typcn typcn-chart-bar menu-icon"></i>
        <span class="menu-title">Báo cáo</span>
      </a>
    </li>
    <li class="nav-item" th:classappend="${activePage == 'settings'} ? 'active'">
      <a class="nav-link" th:href="@{/admin/settings}">
        <i class="typcn typcn-cog-outline menu-icon"></i>
        <span class="menu-title">Cài đặt</span>
      </a>
    </li>
  </ul>
</nav>

<!-- ===== FOOTER FRAGMENT ===== -->
<footer th:fragment="footer" class="footer">
  <div class="card">
    <div class="card-body">
      <div class="d-sm-flex justify-content-center justify-content-sm-between">
        <span class="text-muted text-center text-sm-left d-block d-sm-inline-block">
          Copyright © 2024 <strong>HotelAdmin</strong>. All rights reserved.
        </span>
        <span class="float-none float-sm-right d-block mt-1 mt-sm-0 text-center text-muted">
          Made with <i class="typcn typcn-heart-full-outline text-danger"></i>
        </span>
      </div>
    </div>
  </div>
</footer>

<!-- ===== ALERTS FRAGMENT ===== -->
<div th:fragment="alerts">
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="typcn typcn-tick me-2"></i>
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="typcn typcn-warning me-2"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
</div>

<!-- ===== DATE SCRIPT FRAGMENT ===== -->
<script th:fragment="dateScript">
  const el = document.getElementById('currentDate');
  if (el) {
    const d = new Date();
    const options = { weekday: 'short', day: '2-digit', month: 'short' };
    el.textContent = 'Hôm nay: ' + d.toLocaleDateString('vi-VN', options);
  }
</script>

</html>
